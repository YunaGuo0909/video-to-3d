# nerfstudio splatfacto training configuration
# Two modes: "debug" for fast iteration, "quality" for final submission.
# Usage: ns-train splatfacto --data <processed_dir> nerfstudio-data
#        Override fields via CLI: ns-train splatfacto --max-num-iterations 30000 ...

mode: quality  # "debug" | "quality"

# ── Shared settings ─────────────────────────────────────────────────────────
output_dir: outputs/
experiment_name: room_reconstruction
timestamp: true

# ── Training iterations ──────────────────────────────────────────────────────
# debug:   3 000 iters  (~2 min on RTX 4070)
# quality: 30 000 iters (~20 min on RTX 4070)
debug_max_num_iterations: 3000
quality_max_num_iterations: 30000

# ── Gaussian densification ───────────────────────────────────────────────────
# Controls how many Gaussians are spawned and pruned during training.
densify_grad_thresh: 0.0002      # default — 0.0001 caused OOM on 16 GiB GPU with shared processes
cull_alpha_thresh: 0.01          # raised from 0.005  — more aggressive floater pruning
densify_from_iter: 500
densify_until_iter: 20000        # extended from 15000 — longer densification for orbital captures
densification_interval: 100

# ── Camera model ─────────────────────────────────────────────────────────────
# OPENCV handles phones with mild fisheye distortion.
camera_optimizer:
  mode: SO3xR3

# ── Viewer ───────────────────────────────────────────────────────────────────
# Set to false on headless training machines.
viewer:
  enabled: false
